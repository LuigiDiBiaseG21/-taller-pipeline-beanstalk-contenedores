version: 0.2

phases:
  pre_build:
    commands:
      - echo Iniciando sesión en Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 737927950229.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Construyendo imagen Docker...
      - docker build -t python_app .
      - echo Etiquetando imagen...
      - docker tag python_app:latest 737927950229.dkr.ecr.us-east-1.amazonaws.com/python_app:latest

  post_build:
    commands:
      - echo Enviando imagen a Amazon ECR...
      - docker push 737927950229.dkr.ecr.us-east-1.amazonaws.com/python_app:latest
      - echo Build finalizado correctamente.
